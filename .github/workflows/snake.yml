name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: nahid0-0
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
# ```

# **Step 2:** After committing, go to your repo → **Actions** tab → run the workflow manually once (click "Run workflow").

# **Step 3:** Once it runs successfully, an `output` branch will be created with the SVG. Then this URL will work:
# ```
# https://raw.githubusercontent.com/nahid0-0/nahid0-0/output/github-contribution-grid-snake.svg
